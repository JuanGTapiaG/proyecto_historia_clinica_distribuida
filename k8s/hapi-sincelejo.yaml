apiVersion: apps/v1
kind: Deployment
metadata:
  name: hapi-sincelejo
  namespace: historia-clinica-distribuida
  labels:
    nodo: sincelejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hapi
      nodo: sincelejo
  template:
    metadata:
      labels:
        app: hapi
        nodo: sincelejo
    spec:
      containers:
      - name: hapi-fhir
        image: hapiproject/hapi:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://citus-coordinator:5432/historia_clinica
        - name: SPRING_DATASOURCE_USERNAME
          value: admin
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: password
        - name: HAPI_FHIR_SERVER_NAME
          value: "HAPI FHIR - Sincelejo"
        livenessProbe:
          httpGet:
            path: /fhir/metadata
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /fhir/metadata
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hapi-sincelejo
  namespace: historia-clinica-distribuida
spec:
  selector:
    app: hapi
    nodo: sincelejo
  ports:
  - port: 8080
    targetPort: 8080
