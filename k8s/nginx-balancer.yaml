apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: historia-clinica-distribuida
data:
  nginx.conf: |
    upstream fhir_backend {
        least_conn;
        server hapi-sincelejo:8080 max_fails=3 fail_timeout=30s;
        server hapi-bogota:8080 max_fails=3 fail_timeout=30s;
        server hapi-medellin:8080 max_fails=3 fail_timeout=30s;
    }
    
    server {
        listen 80;
        
        location /fhir {
            proxy_pass http://fhir_backend/fhir;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Upstream $upstream_addr always;
        }
        
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-balancer
  namespace: historia-clinica-distribuida
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-balancer
  template:
    metadata:
      labels:
        app: nginx-balancer
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-balancer
  namespace: historia-clinica-distribuida
spec:
  type: NodePort
  selector:
    app: nginx-balancer
  ports:
  - port: 80
    nodePort: 30080
